# Netlify config for the ApplyPilot Angular frontend.
# In Netlify: Add new site > Import from Git > pick Tharuntan/applypilot.
# Then set an env var API_BASE_URL = https://<your-render-backend>.onrender.com/api
# (see docs/DEPLOY.md). The build injects it into the production bundle.

[build]
  base = "applypilot/frontend/applypilot-ui"
  command = "npm ci && node scripts/set-prod-api.js && npm run build"
  publish = "dist/applypilot-ui/browser"

[build.environment]
  NODE_VERSION = "20"

# SPA routing: serve index.html for client-side routes
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
