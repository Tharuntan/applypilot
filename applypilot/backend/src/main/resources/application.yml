server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: applypilot-backend
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/applypilot}
    username: ${DB_USERNAME:applypilot}
    password: ${DB_PASSWORD:applypilot}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: false
    open-in-view: false
    show-sql: false
  servlet:
    multipart:
      max-file-size: 6MB
      max-request-size: 6MB

# ApplyPilot application settings
applypilot:
  security:
    # CHANGE THIS in production. Must be a long, random, Base64-friendly string (>= 32 bytes).
    jwt-secret: ${JWT_SECRET:ZmFrZS1kZXYtc2VjcmV0LWNoYW5nZS1tZS1hcHBseXBpbG90LTIwMjQtc3VwZXItc2VjcmV0LWtleQ==}
    jwt-expiration-ms: ${JWT_EXPIRATION_MS:86400000}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:4200}
  ai:
    # Defaults to Groq (free, OpenAI-compatible). Just set AI_API_KEY to enable AI.
    api-key: ${AI_API_KEY:}
    base-url: ${AI_BASE_URL:https://api.groq.com/openai/v1}
    model: ${AI_MODEL:llama-3.3-70b-versatile}
    timeout-seconds: ${AI_TIMEOUT_SECONDS:60}

logging:
  level:
    com.applypilot: INFO
    org.springframework.security: WARN
